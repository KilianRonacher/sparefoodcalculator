<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zutaten-Katalog — SpareFoodCalculator</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .catalog-hero {
      text-align: center;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, var(--color-accent-gold), var(--color-accent-red));
      color: white;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(255, 209, 102, 0.3);
    }
    
    .catalog-hero h1 {
      margin: 0 0 0.5rem 0;
      font-size: 2rem;
    }
    
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    
    .category-card {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.1), rgba(78, 205, 196, 0.1));
      border: 2px solid var(--color-accent-gold);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(255, 209, 102, 0.3);
      border-color: var(--color-accent-teal);
    }
    
    .category-card h3 {
      margin: 0 0 1rem 0;
      color: var(--color-accent-gold);
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .category-card .count {
      font-size: 2rem;
      font-weight: bold;
      color: var(--color-accent-red);
      margin-bottom: 0.5rem;
    }
    
    .ingredients-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
      max-height: 200px;
      overflow-y: auto;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
    }
    
    .ingredient-badge {
      padding: 0.3rem 0.7rem;
      background: var(--color-accent-teal);
      color: white;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .search-box {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: rgba(78, 205, 196, 0.08);
      border-radius: 12px;
      border: 2px solid var(--color-accent-teal);
    }
    
    .search-box input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid var(--color-accent-teal);
      border-radius: 8px;
      font-size: 1rem;
    }
    
    .stats-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    
    .stat-box {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--color-accent-teal), var(--color-accent-gold));
      color: white;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-box .number {
      font-size: 2rem;
      font-weight: bold;
      display: block;
    }
    
    .stat-box .label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo"><a href="../index.html">SpareFoodCalculator</a></h1>
      <div class="nav-wrap">
        <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-label="Menü">☰</button>
        <nav class="main-nav mobile-hidden" id="main-nav">
          <a href="../index.html">Startseite</a>
          <a href="search.html">Generator</a>
          <a href="ingredients-catalog.html" class="active">Zutaten</a>
          <a href="contact.html">Kontakt</a>
          <a href="impressum.html">Impressum</a>
        </nav>
      </div>
      <div class="theme-lang-controls">
        <button id="theme-toggle-btn" style="min-width:7em">🌙 Dunkel-Modus</button>
        <button id="lang-toggle-btn">English</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="catalog-hero">
      <h1>📚 Zutaten-Katalog</h1>
      <p>Über 500 Zutaten in 15 Kategorien verfügbar</p>
    </section>

    <div class="stats-bar" id="stats-bar"></div>

    <section class="search-box">
      <input 
        type="text" 
        id="search-input" 
        placeholder="🔍 Zutat suchen... (z.B. Tomate, Basilikum, Lachs)"
      />
    </section>

    <section id="categories-container" class="category-grid"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <nav>
        <a href="../index.html">Startseite</a> •
        <a href="contact.html">Kontakt</a> •
        <a href="impressum.html">Impressum</a>
      </nav>
      <p>© 2025 Kilian Ronacher — SpareFoodCalculator</p>
    </div>
  </footer>

  <script src="../i18n.js"></script>
  <script src="../ingredients.js"></script>
  <script src="../app.js"></script>
  <script>
    // Category icons and colors
    const categoryIcons = {
      'gemüse': '🥬',
      'fleisch': '🥩',
      'fisch': '🐟',
      'milchprodukte': '🥛',
      'getreide': '🌾',
      'öle': '🫒',
      'gewürze': '🌶️',
      'kräuter': '🌿',
      'saucen': '🍯',
      'obst': '🍎',
      'nüsse': '🥜',
      'süßes': '🍰',
      'eier': '🥚',
      'getränke': '☕',
      'fertigprodukte': '🥫'
    };

    const categoryNames = {
      'gemüse': 'Gemüse',
      'fleisch': 'Fleisch',
      'fisch': 'Fisch & Meeresfrüchte',
      'milchprodukte': 'Milchprodukte',
      'getreide': 'Getreide & Kohlenhydrate',
      'öle': 'Öle & Fette',
      'gewürze': 'Gewürze',
      'kräuter': 'Kräuter',
      'saucen': 'Saucen & Würzmittel',
      'obst': 'Obst',
      'nüsse': 'Nüsse & Samen',
      'süßes': 'Süßes & Backzutaten',
      'eier': 'Eier',
      'getränke': 'Getränke',
      'fertigprodukte': 'Fertigprodukte'
    };

    // Render statistics
    function renderStats() {
      const statsBar = document.getElementById('stats-bar');
      const totalCategories = Object.keys(ingredientsDatabase).length;
      const totalIngredients = allIngredients.length;

      statsBar.innerHTML = `
        <div class="stat-box">
          <span class="number">${totalCategories}</span>
          <span class="label">Kategorien</span>
        </div>
        <div class="stat-box">
          <span class="number">${totalIngredients}</span>
          <span class="label">Zutaten</span>
        </div>
      `;
    }

    // Render all categories
    function renderCategories(searchTerm = '') {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';

      Object.entries(ingredientsDatabase).forEach(([category, ingredients]) => {
        // Filter ingredients if search term provided
        let filteredIngredients = ingredients;
        if (searchTerm) {
          filteredIngredients = ingredients.filter(ing => 
            ing.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }

        // Skip if no matches
        if (searchTerm && filteredIngredients.length === 0) return;

        const card = document.createElement('div');
        card.className = 'category-card';

        const icon = categoryIcons[category] || '📦';
        const name = categoryNames[category] || category;
        const count = filteredIngredients.length;

        card.innerHTML = `
          <h3>${icon} ${name}</h3>
          <div class="count">${count}</div>
          <div class="ingredients-list" id="list-${category}"></div>
        `;

        container.appendChild(card);

        // Render ingredient badges
        const list = document.getElementById(`list-${category}`);
        filteredIngredients.slice(0, 30).forEach(ing => {
          const badge = document.createElement('span');
          badge.className = 'ingredient-badge';
          badge.textContent = ing;
          
          // Highlight search term
          if (searchTerm && ing.toLowerCase().includes(searchTerm.toLowerCase())) {
            badge.style.background = 'var(--color-accent-red)';
          }
          
          list.appendChild(badge);
        });

        // Show more indicator
        if (filteredIngredients.length > 30) {
          const more = document.createElement('span');
          more.className = 'ingredient-badge';
          more.textContent = `+${filteredIngredients.length - 30} weitere`;
          more.style.background = 'var(--color-accent-gold)';
          list.appendChild(more);
        }
      });
    }

    // Search functionality
    document.getElementById('search-input').addEventListener('input', (e) => {
      const searchTerm = e.target.value.trim();
      renderCategories(searchTerm);
    });

    // Initial render
    renderStats();
    renderCategories();
  </script>
</body>
</html>
